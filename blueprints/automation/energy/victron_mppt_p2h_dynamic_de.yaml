# version: 2.0.0
blueprint:
  name: myPV P2H – Dynamische Überschusssteuerung mit Anti-Limited (Victron)
  description: >-
    Steuert den myPV P2H Heizstab dynamisch anhand des berechneten PV-Überschusses
    (Solarleistung minus Hausverbrauch). Aktivierung nur wenn der Batterie-SOC über
    dem Schwellwert liegt.

    **Anti-Limited-Regelung:** Geht ein Victron MPPT in den 'Limited'-Modus
    (Spannung-/Strombegrenzt), wird die Heizstab-Leistung schrittweise erhöht,
    bis der MPPT wieder aktiv trackt oder 3500 W erreicht sind. So wird
    überschüssige Solarenergie thermisch abgenommen, bevor der MPPT drosselt.

    **Freigabebedingungen (kombinierbar):**
    - SOC über Schwellwert
    - Mindest-Überschuss vorhanden
    - Zieltemperatur noch nicht erreicht

    Voraussetzung: myPV P2H Integration installiert und konfiguriert,
    Victron Integration mit MPPT-Betriebsmodus-Sensor aktiv.

  domain: automation
  source_url: https://raw.githubusercontent.com/itsh-neumeier/restapi_mypv-p2h/master/blueprints/automation/energy/victron_mppt_p2h_dynamic_de.yaml
  author: Timo Neumeier

  input:
    target_power_entity:
      name: myPV P2H – Leistungsvorgabe (Soll)
      description: "number-Entity der myPV P2H Integration (0–3500 W)."
      selector:
        entity:
          domain: number

    solar_power_sensor:
      name: Solarleistung-Sensor
      description: >-
        Sensor mit der aktuellen Gesamt-PV-Leistung in Watt (positiv = Erzeugung).
        Beispiel: Victron MPPT PV-Leistung oder Wechselrichter-Ausgangsleistung.
      selector:
        entity:
          domain: sensor
          device_class: power

    house_consumption_sensor:
      name: Hausverbrauch-Sensor
      description: >-
        Sensor mit dem aktuellen Hausverbrauch in Watt (positiv = Verbrauch,
        ohne Heizstab). Beispiel: Victron System-Verbrauch.
      selector:
        entity:
          domain: sensor
          device_class: power

    mppt_mode_entities:
      name: MPPT-Betriebsmodus-Sensoren
      description: >-
        Ein oder mehrere Victron MPPT-Betriebsmodus-Sensoren
        (Tracker Operation Mode). Wird für die Anti-Limited-Regelung ausgewertet.
        Erkannt werden Zustände die "limit" oder "begrenzt" enthalten (Gross-/
        Kleinschreibung egal).
      selector:
        entity:
          multiple: true
          domain: sensor

    battery_soc_sensor:
      name: Batterie-Ladestand-Sensor
      description: Sensor mit dem aktuellen SOC in Prozent (0–100 %).
      selector:
        entity:
          domain: sensor
          device_class: battery

    battery_soc_threshold:
      name: Mindest-SOC für Aktivierung
      description: >-
        Heizstab wird nur aktiviert, wenn der Batterie-SOC diesen Wert
        überschreitet. Empfehlung: 80–90 % um Batteriepuffer zu erhalten.
      default: 80
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: box

    temperature_sensor:
      name: Temperatursensor Heizstab / Pufferspeicher
      description: "Temperatursensor der myPV P2H Integration oder externer Sensor."
      selector:
        entity:
          domain: sensor
          device_class: temperature

    max_temperature:
      name: Zieltemperatur (Abschalttemperatur)
      description: Bei Erreichen dieser Temperatur wird der Heizstab auf 0 W gesetzt.
      default: 60
      selector:
        number:
          min: 20
          max: 90
          step: 1
          unit_of_measurement: "°C"
          mode: box

    min_surplus_power:
      name: Mindest-Überschuss für Aktivierung
      description: >-
        Unter diesem Schwellwert bleibt der Heizstab ausgeschaltet
        (außer bei aktiver Anti-Limited-Regelung).
      default: 200
      selector:
        number:
          min: 0
          max: 1000
          step: 50
          unit_of_measurement: "W"
          mode: box

    anti_limited_step:
      name: Anti-Limited-Schrittweite
      description: >-
        Um diesen Wert wird die Leistung pro Zyklus erhöht, solange ein
        MPPT im Limited-Modus ist. Kleinere Werte = sanftere Regelung,
        größere Werte = schnellere Reaktion.
      default: 100
      selector:
        number:
          min: 50
          max: 500
          step: 50
          unit_of_measurement: "W"
          mode: box

    check_interval:
      name: Zyklisches Prüfintervall
      description: Wie oft wird die Leistung neu berechnet?
      default: "/15"
      selector:
        select:
          mode: dropdown
          options:
            - label: Alle 5 Sekunden
              value: "/5"
            - label: Alle 10 Sekunden
              value: "/10"
            - label: Alle 15 Sekunden (Standard)
              value: "/15"
            - label: Alle 30 Sekunden
              value: "/30"
            - label: Alle 60 Sekunden
              value: "/60"

mode: single
max_exceeded: silent

trigger_variables:
  mppt_mode_entities: !input mppt_mode_entities

triggers:
  - id: periodic_check
    trigger: time_pattern
    seconds: !input check_interval

  - id: mppt_limited
    trigger: template
    value_template: >-
      {% set ns = namespace(found=false) %}
      {% for e in expand(mppt_mode_entities) %}
        {% if 'limit' in e.state | lower or 'begrenzt' in e.state | lower %}
          {% set ns.found = true %}
        {% endif %}
      {% endfor %}
      {{ ns.found }}
    for:
      seconds: 5

  - id: temp_reached
    trigger: numeric_state
    entity_id: !input temperature_sensor
    above: !input max_temperature

conditions: []

actions:
  - variables:
      target_power_entity: !input target_power_entity
      solar_power_sensor: !input solar_power_sensor
      house_consumption_sensor: !input house_consumption_sensor
      mppt_mode_entities: !input mppt_mode_entities
      battery_soc_sensor: !input battery_soc_sensor
      battery_soc_threshold: !input battery_soc_threshold
      temperature_sensor: !input temperature_sensor
      max_temperature: !input max_temperature
      min_surplus_power: !input min_surplus_power
      anti_limited_step: !input anti_limited_step

  - variables:
      solar_w: "{{ [states(solar_power_sensor) | float(0), 0] | max }}"
      consumption_w: "{{ [states(house_consumption_sensor) | float(0), 0] | max }}"
      surplus_w: "{{ [solar_w - consumption_w, 0] | max }}"
      temp: "{{ states(temperature_sensor) | float(999) }}"
      soc: "{{ states(battery_soc_sensor) | float(0) }}"
      current_power: "{{ states(target_power_entity) | float(0) }}"
      any_limited: >-
        {% set ns = namespace(found=false) %}
        {% for e in expand(mppt_mode_entities) %}
          {% if 'limit' in e.state | lower or 'begrenzt' in e.state | lower %}
            {% set ns.found = true %}
          {% endif %}
        {% endfor %}
        {{ ns.found }}

  - variables:
      new_power: >-
        {% if temp >= max_temperature | float(90) %}
          0
        {% elif soc <= battery_soc_threshold | float(0) %}
          0
        {% elif any_limited %}
          {{ [current_power + anti_limited_step | float(100), 3500] | min | int }}
        {% elif surplus_w >= min_surplus_power | float(0) %}
          {{ [(( surplus_w | int ) // 50) * 50, 3500] | min | int }}
        {% else %}
          0
        {% endif %}

  - service: number.set_value
    target:
      entity_id: !input target_power_entity
    data:
      value: "{{ new_power }}"
